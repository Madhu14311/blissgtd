spring.application.name=bsgated-backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bs_gated_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# Security Configuration
app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-before-production-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081,http://localhost:3000}

# Development SuperAdmin seed.
# Keep enabled during development so you always have one approved SuperAdmin.
# In production, set real values through environment variables, create the first account, then disable this.
app.seed.superadmin.enabled=${SEED_SUPERADMIN_ENABLED:true}
app.seed.superadmin.phone=${SEED_SUPERADMIN_PHONE:9000000000}
app.seed.superadmin.password=${SEED_SUPERADMIN_PASSWORD:admin123}
app.seed.superadmin.name=${SEED_SUPERADMIN_NAME:Development Super Admin}

# Twilio Configuration
twilio.account.sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth.token=d016f1637b85e6f6a85c9d7169cd6185
twilio.verify.sid=VA027fa938642fac18416eab6aa1879e10
otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
