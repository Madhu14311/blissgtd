spring.application.name=bsgated-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bs_gated_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# Twilio Configuration
twilio.account.sid=YOUR_TWILIO_SID_HERE
twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN_HERE
twilio.verify.sid=YOUR_TWILIO_VERIFY_SID_HERE
